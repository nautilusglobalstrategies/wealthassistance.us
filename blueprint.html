<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Blueprint | Wealth Assistance</title>

<style>
:root{
  --bg:#06080d;
  --gold:#d6a45c;
  --gold-soft:#f3d7a2;
  --text:#f7f3ee;
  --muted:#d0c7bc;
  --line:rgba(214,164,92,.18);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

/* LINKS */
a,
a:visited,
a:active{
  color:var(--muted);
  text-decoration:none;
}

a:hover{
  color:var(--gold-soft);
}

/* 🔥 BACKGROUND FIX (NO CROPPING) */
body{
  font-family:Georgia, serif;
  color:var(--text);
  background:
    linear-gradient(
      rgba(6,8,13,.65),
      rgba(6,8,13,.75)
    ),
    url("blueprint-hero.PNG") center center / contain no-repeat fixed;
  background-color:#06080d;
}

/* CONTAINER */
.container{
  width:min(92%,1200px);
  margin:auto;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.nav{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:16px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{height:50px;}

.brand-name{
  font-size:.9rem;
  letter-spacing:2px;
  color:var(--gold-soft);
}

.nav-links{
  display:flex;
  justify-content:center;
  gap:22px;
  font-family:Arial,sans-serif;
  flex-wrap:wrap;
}

.nav-links a:hover{color:var(--gold-soft);}

.nav-cta{
  padding:10px 16px;
  border:1px solid var(--gold);
  border-radius:999px;
  color:var(--gold-soft);
}

/* HERO */
.hero{
  padding:140px 0 120px;
  text-align:center;
}

.hero h1{
  font-size:clamp(2.7rem,5vw,4.4rem);
  margin-bottom:20px;
}

.hero p{
  font-family:Arial,sans-serif;
  color:var(--muted);
  max-width:760px;
  margin:auto;
  line-height:1.7;
}

/* SECTION */
.section{
  padding:70px 0;
}

/* INTRO */
.intro{
  max-width:900px;
  margin:auto;
  text-align:center;
}

.intro h2{
  font-size:clamp(2rem,4vw,3rem);
  margin-bottom:18px;
}

.intro p{
  font-family:Arial,sans-serif;
  color:var(--muted);
  line-height:1.7;
}

/* GRID */
.grid{
  margin-top:50px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* CARD */
.card{
  padding:30px;
  border-radius:20px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(6px);
}

.card h3{
  color:var(--gold-soft);
  margin-bottom:12px;
}

.card p{
  font-family:Arial,sans-serif;
  color:var(--muted);
  line-height:1.7;
}

/* PROCESS */
.process{
  margin-top:60px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.step{
  padding:20px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.45);
  text-align:center;
}

.step h4{
  color:var(--gold-soft);
  margin-bottom:8px;
}

/* CTA */
.cta{
  margin-top:60px;
  text-align:center;
  padding:40px;
  border-radius:20px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.55);
}

.cta h3{
  color:var(--gold-soft);
  margin-bottom:12px;
}

.cta p{
  font-family:Arial,sans-serif;
  color:var(--muted);
  margin-bottom:20px;
}

.cta a{
  padding:12px 22px;
  border:1px solid var(--gold);
  border-radius:999px;
  color:var(--gold-soft);
}

/* FOOTER */
footer{
  border-top:1px solid var(--line);
  padding:30px 0;
  font-family:Arial,sans-serif;
  color:var(--muted);
}

/* MOBILE */
@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .process{grid-template-columns:1fr;}
  .nav{grid-template-columns:1fr;gap:10px;}
}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="brand">
      <img src="logo.png.WEBP">
      <div class="brand-name">WEALTH ASSISTANCE</div>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="blueprint.html">Blueprint</a>
      <a href="clients.html">Who We Work With</a>
      <a href="strategy.html">Strategy Lab</a>
    </div>

    <a href="contact.html" class="nav-cta">Private Consultation</a>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>A framework for wealth designed to endure.</h1>
    <p>
      The Legacy Blueprint is a structured system aligning ownership, control,
      protection, and long-term continuity into one cohesive strategy.
    </p>
  </div>
</section>

</body>
</html>
